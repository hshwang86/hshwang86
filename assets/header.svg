      <stop offset="0" stop-color="#36BCF7">
        <animate attributeName="stop-color" values="#36BCF7;#7B2BF9;#F72585;#36BCF7" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#7B2BF9">
