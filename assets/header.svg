  <text x="600" y="95" text-anchor="middle" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="50" font-weight="700">Hwang Hong Seok</text>
  <text x="600" y="132" text-anchor="middle" fill="#ffffff" opacity="0.9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="19" font-weight="500">Full-Stack | ERP | Game &amp; VR | AI Automation</text>
