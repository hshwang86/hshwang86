    <path fill="url(#grad)" d="M0,0 H2400 V160 Q2250,190 2100,160 Q1950,130 1800,160 Q1650,190 1500,160 Q1350,130 1200,160 Q1050,190 900,160 Q750,130 600,160 Q450,190 300,160 Q150,130 0,160 Z">
