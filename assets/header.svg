  <g clip-path="url(#clip)">
    <path fill="url(#grad)" opacity="0.45" d="M0,0 H2400 V175 Q2250,205 2100,175 Q1950,145 1800,175 Q1650,205 1500,175 Q1350,145 1200,175 Q1050,205 900,175 Q750,145 600,175 Q450,205 300,175 Q150,145 0,175 Z">
